<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>각종 계산기</title>
    <style>
        :root {
            --primary-color: #1F8EEB;
            --bg-color: #f4f7f9;
            --card-bg: #ffffff;
            --border-color: #d1d9e0;
            --text-color: #333333;
            --accent-color: #eef2f6;
            --danger-color: #FF5252;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            padding: 20px 15px;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            max-width: 500px;
            width: 100%;
            box-sizing: border-box;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            text-align: center;
        }

        .container h2 {
            font-size: 22px;
            margin-top: 0;
            margin-bottom: 15px;
            padding-bottom: 8px;
            border-bottom: 2px solid var(--primary-color);
            color: var(--primary-color);
            display: inline-block;
        }

        .formula {
            font-size: 13px;
            color: #666;
            margin-bottom: 20px;
            background: #f9f9f9;
            padding: 10px;
            border-radius: 6px;
            width: 100%;
            box-sizing: border-box;
        }

        .calc-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 10px;
        }

        .calc-table td {
            padding: 8px 0;
            vertical-align: middle;
        }

        .td-label {
            width: 40%;
            font-weight: 600;
            font-size: 14px;
            text-align: left;
            padding-right: 5px;
        }

        .td-content {
            width: 60%;
            text-align: right;
            white-space: nowrap;
        }

        .txt-input {
            padding: 10px;
            font-size: 16px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            width: 120px;
            height: 44px;
            text-align: right;
            background-color: var(--accent-color);
            box-sizing: border-box;
            vertical-align: middle;
        }

        .txt-short {
            width: 70px !important;
        }

        .txt-input:focus {
            outline: none;
            border-color: var(--primary-color);
            background-color: #fff;
        }

        .txt-result {
            background-color: #fff9db;
            font-weight: bold;
            border-color: #fab005;
        }

        .stepper {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            margin-left: 4px;
            vertical-align: middle;
        }

        .minus-plus-btn {
            width: 40px;
            height: 40px;
            font-size: 20px;
            font-weight: bold;
            border: 1px solid var(--border-color);
            background: white;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .minus-plus-btn:active {
            background-color: #e9ecef;
        }

        .unit {
            display: inline-block;
            margin-left: 4px;
            font-size: 14px;
            color: #555;
            vertical-align: middle;
        }

        .btn-group {
            margin-top: 15px;
        }

        .action-btn {
            width: 100%;
            max-width: 200px;
            padding: 12px;
            font-size: 16px;
            font-weight: 600;
            color: white;
            background-color: var(--danger-color);
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>매출 총이익률</h2>
        <div class="formula">(판매가 - 원가) ÷ 판매가</div>
        <table class="calc-table">
            <tr>
                <td class="td-label">매입가(원가)</td>
                <td class="td-content">
                    <input class="txt-input" id="txtProductCost" type="number" placeholder="0">
                    <span class="unit">원</span>
                </td>
            </tr>
            <tr>
                <td class="td-label">판매가</td>
                <td class="td-content">
                    <input class="txt-input" id="txtSellPrice" type="number" placeholder="0" onkeyup="calculateProfitRate()">
                    <span class="unit">원</span>
                </td>
            </tr>
            <tr>
                <td class="td-label">매출 총이익률</td>
                <td class="td-content">
                    <input class="txt-input txt-result txt-short" id="txtProfitRate" type="number" readonly>
                    <span class="unit">%</span>
                </td>
            </tr>
            <tr>
                <td class="td-label">순이익</td>
                <td class="td-content">
                    <input class="txt-input txt-result" id="txtNetProfit" type="number" readonly>
                    <span class="unit">원</span>
                </td>
            </tr>
        </table>
        <div class="btn-group">
            <button class="action-btn" onclick="resetProfitRate()">초기화</button>
        </div>
    </div>

    <div class="container">
        <h2>판매가 계산</h2>
        <div style="height: 10px;"></div>
        <table class="calc-table">
            <tr>
                <td class="td-label">매입가(원가)</td>
                <td class="td-content">
                    <input class="txt-input" id="txtProductCost2" type="number" placeholder="0" onkeyup="calculateProductCost()">
                    <span class="unit">원</span>
                </td>
            </tr>
            <tr>
                <td class="td-label">목표 이익률</td>
                <td class="td-content">
                    <input class="txt-input txt-result txt-short" id="txtProfitRate2" type="number" value="30" readonly>
                    <span class="unit">%</span>
                    <div class="stepper">
                        <button class="minus-plus-btn" onclick="decreaseProfitRate2()">-</button>
                        <button class="minus-plus-btn" onclick="increaseProfitRate2()">+</button>
                    </div>
                </td>
            </tr>
            <tr>
                <td class="td-label">권장 판매가</td>
                <td class="td-content">
                    <input class="txt-input txt-result" id="txtSellPrice2" type="number" readonly>
                    <span class="unit">원</span>
                </td>
            </tr>
        </table>
        <div class="btn-group">
            <button class="action-btn" onclick="resetProductCost()">초기화</button>
        </div>
    </div>

    <script>
        function calculateProfitRate() {
            var a = document.getElementById("txtProductCost");
            var b = document.getElementById("txtSellPrice");
            var c = document.getElementById("txtProfitRate");
            var d = document.getElementById("txtNetProfit");

            if (!a.value || !b.value || parseFloat(b.value) === 0) {
                c.value = ""; d.value = ""; return;
            }

            var k = (parseFloat(b.value) - parseFloat(a.value)) / parseFloat(b.value) * 100;
            c.value = k.toFixed(2);
            d.value = Math.floor(parseFloat(b.value) - parseFloat(a.value));
        }

        function resetProfitRate() {
            document.getElementById("txtProductCost").value = "";
            document.getElementById("txtSellPrice").value = "";
            document.getElementById("txtProfitRate").value = "";
            document.getElementById("txtNetProfit").value = "";
            document.getElementById("txtProductCost").focus();
        }

        function calculateProductCost() {
            var a = document.getElementById("txtProfitRate2");
            var b = document.getElementById("txtProductCost2");
            var c = document.getElementById("txtSellPrice2");

            var rate = parseFloat(a.value);
            var cost = parseFloat(b.value);

            // 이익률이 100% 이상이 되는 것을 방지
            if (isNaN(rate) || isNaN(cost) || rate >= 100) {
                c.value = ""; return;
            }
            c.value = Math.floor(cost / (1 - (rate / 100)));
        }

        function increaseProfitRate2() {
            var a = document.getElementById("txtProfitRate2");
            var currentRate = parseFloat(a.value);

            // 최대 99%까지만 증가하도록 제한
            if (currentRate < 99) {
                a.value = currentRate + 1;
                calculateProductCost();
            }
        }

        function decreaseProfitRate2() {
            var a = document.getElementById("txtProfitRate2");
            var currentRate = parseFloat(a.value);
            if (currentRate > 0) {
                a.value = currentRate - 1;
                calculateProductCost();
            }
        }

        function resetProductCost() {
            document.getElementById("txtProductCost2").value = "";
            document.getElementById("txtProfitRate2").value = 30;
            document.getElementById("txtSellPrice2").value = "";
            document.getElementById("txtProductCost2").focus();
        }
    </script>
</body>
</html>
