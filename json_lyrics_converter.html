<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON 가사 변환기</title>
    <style>
        body { margin: 0; display: flex; flex-direction: column; height: 100vh; font-family: 'Malgun Gothic', sans-serif; background-color: #f4f4f9; }

        .header-container {
            display: flex;
            padding: 15px 20px;
            background-color: #2c3e50;
            color: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            gap: 20px;
        }

        .header-left {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .header-title {
            font-weight: bold;
            font-size: 1.4rem;
            margin-bottom: 8px;
        }

        .header-subtitle { font-size: 0.85rem; color: #bdc3c7; line-height: 1.6; }

        .lang-selector {
            display: flex;
            gap: 15px;
            font-size: 1rem;
            padding-top: 10px;
            border-top: 1px solid #445566;
        }
        .lang-selector label { cursor: pointer; display: flex; align-items: center; gap: 5px; }

        .button-wrapper {
            display: flex;
            align-items: stretch;
        }

        .copy-btn {
            width: 120px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.1rem;
            transition: all 0.2s;
        }
        .copy-btn:hover { background-color: #2980b9; }

        /* 메인 컨테이너 */
        .container { display: grid; gap: 15px; padding: 20px; flex: 1; transition: all 0.3s ease; }

        /* 한국어 모드: 가로 2개 */
        .mode-ko { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr; }

        /* 영어 모드: 가로 3개 */
        .mode-en { grid-template-columns: 1fr 1fr 1fr; grid-template-rows: 1fr; }

        /* 일본어 모드: 2x2 격자 */
        .mode-ja { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }

        textarea {
            width: 100%; height: 100%; padding: 15px; font-size: 14px;
            font-family: 'Consolas', monospace; border: 2px solid #bdc3c7;
            border-radius: 8px; resize: none; outline: none; box-sizing: border-box;
            background-color: #fff;
        }
        textarea:focus { border-color: #3498db; }
        #output { background-color: #ecf0f1; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="header-container">
        <div class="header-left">
            <div>
                <div class="header-title">JSON 가사 변환기</div>
                <div class="header-subtitle">
                    👉 첫 가사가 2초 이상 걸린다면 '[00:00.000]♪' 추가<br>
                    👉 시간은 있는데 가사가 빈 줄이라면 음표 특수문자(♪) 추가
                </div>
            </div>
            <div class="lang-selector">
                <label><input type="radio" name="lang" value="ko" checked onchange="toggleMode()"> 한국어</label>
                <label><input type="radio" name="lang" value="en" onchange="toggleMode()"> 영어</label>
                <label><input type="radio" name="lang" value="ja" onchange="toggleMode()"> 일본어</label>
            </div>
        </div>
        <div class="button-wrapper">
            <button class="copy-btn" id="copyBtn" onclick="copyToClipboard()">결과 복사</button>
        </div>
    </div>

    <div id="mainContainer" class="container mode-ko">
        <textarea id="input" placeholder="여기에 JSON 데이터를 붙여넣으세요..."></textarea>
        <textarea id="extra-input" class="hidden"></textarea>
        <textarea id="trans-input" class="hidden"></textarea>
        <textarea id="output" placeholder="변환된 결과가 여기에 표시됩니다..." readonly></textarea>
    </div>

    <script>
        const container = document.getElementById('mainContainer');
        const inputArea = document.getElementById('input');
        const extraArea = document.getElementById('extra-input');
        const transArea = document.getElementById('trans-input');
        const outputArea = document.getElementById('output');
        const copyBtn = document.getElementById('copyBtn');

        function toggleMode() {
            const lang = document.querySelector('input[name="lang"]:checked').value;
            transArea.classList.add('hidden');
            extraArea.classList.add('hidden');

            if (lang === 'ko') {
                container.className = "container mode-ko";
            } else if (lang === 'en') {
                container.className = "container mode-en";
                transArea.classList.remove('hidden');
                transArea.placeholder = "여기에 영어 가사 해석을 입력하세요...";
            } else if (lang === 'ja') {
                container.className = "container mode-ja";
                extraArea.classList.remove('hidden');
                transArea.classList.remove('hidden');
                extraArea.placeholder = "여기에 일본어 가사 발음을 입력하세요...";
                transArea.placeholder = "여기에 일본어 가사 해석을 입력하세요...";
            }
            processJson();
        }

        function formatTime(ms) {
            const totalMs = parseInt(ms, 10);
            if (isNaN(totalMs)) return "00:00.000";
            const mm = String(Math.floor(totalMs / 60000)).padStart(2, '0');
            const ss = String(Math.floor((totalMs % 60000) / 1000)).padStart(2, '0');
            const mmm = String(totalMs % 1000).padStart(3, '0');
            return `${mm}:${ss}.${mmm}`;
        }

        [inputArea, extraArea, transArea].forEach(el => el.addEventListener('keyup', processJson));

        function processJson() {
            const rawValue = inputArea.value.trim();
            const extraLines = extraArea.value.trim().split('\n').filter(l => l.trim() !== "");
            const transLines = transArea.value.trim().split('\n').filter(l => l.trim() !== "");

            if (!rawValue) { outputArea.value = ""; return; }

            try {
                const data = JSON.parse(rawValue);
                const lines = data.lyrics?.lines;
                if (!Array.isArray(lines) || lines.length === 0) return;

                let resultLines = [];
                if (parseInt(lines[0].startTimeMs, 10) >= 2000) resultLines.push("[00:00.000]♪");

                const lang = document.querySelector('input[name="lang"]:checked').value;
                const actualCount = lines.filter(l => l.words && l.words.trim() !== "" && l.words.trim() !== "♪").length;

                const isExtraMatch = extraLines.length === actualCount;
                const isTransMatch = transLines.length === actualCount;

                let eIdx = 0;
                let tIdx = 0;

                lines.forEach((line) => {
                    const time = formatTime(line.startTimeMs);
                    const isBlank = !line.words || line.words.trim() === "" || line.words.trim() === "♪";
                    const lyric = isBlank ? "♪" : line.words;

                    resultLines.push(`[${time}]${lyric}`);

                    if (!isBlank) {
                        if (extraLines.length > 0 && isExtraMatch) {
                            resultLines.push(`[${time}]${extraLines[eIdx].trim()}`);
                            eIdx++;
                        }
                        if (transLines.length > 0 && isTransMatch) {
                            resultLines.push(`[${time}]${transLines[tIdx].trim()}`);
                            tIdx++;
                        }
                    }
                });
                outputArea.value = resultLines.join('\n');
            } catch (e) { outputArea.value = "올바른 JSON 형식이 아닙니다."; }
        }

        async function copyToClipboard() {
            const text = outputArea.value.trim();
            if (!text) return;
            try {
                await navigator.clipboard.writeText(text);
                copyBtn.textContent = "복사 완료";
                copyBtn.style.backgroundColor = "#27ae60";
                setTimeout(() => {
                    copyBtn.textContent = "결과 복사";
                    copyBtn.style.backgroundColor = "#3498db";
                }, 1500);
            } catch (err) { alert("복사 실패"); }
        }

        toggleMode();
    </script>
</body>
</html>
